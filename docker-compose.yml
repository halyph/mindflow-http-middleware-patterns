version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP HTTP receiver
      - "4318:4318"
      # OTLP gRPC receiver (optional)
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - middleware-demo

networks:
  middleware-demo:
    driver: bridge
