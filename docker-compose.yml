version: '3.8'

services:
  jaeger:
    # Jaeger v2 - latest version from official registry
    # Docs: https://www.jaegertracing.io/docs/2.15/getting-started/
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    container_name: jaeger
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP HTTP receiver
      - "4318:4318"
      # OTLP gRPC receiver (optional)
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - middleware-demo

networks:
  middleware-demo:
    driver: bridge
